name: 3D Contribution Graph

on:
  workflow_dispatch:
  schedule:
    # Every day at 02:00 KST (17:00 UTC)
    - cron: "0 17 * * *"

permissions:
  contents: write

concurrency:
  group: profile-3d-contrib
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution charts
        uses: yoshi389111/github-profile-3d-contrib@0.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Prepare light and dark variants
        run: |
          mkdir -p output-3d-contrib
          cp profile-3d-contrib/profile-season-animate.svg output-3d-contrib/day.svg
          cp profile-3d-contrib/profile-night-rainbow.svg output-3d-contrib/night.svg

      - name: Publish charts
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output-3d-contrib
          publish_dir: ./output-3d-contrib
          force_orphan: true
